# This workflow will build a Java project with Maven
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: windows-latest
    env:
      RUN_APPIUM: 'false'

    steps:
    - name: Set resolution to 1920x1080
      run: |
       Set-DisplayResolution -Width 1920 -Height 1080 -Force
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: temurin
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Install Appium
      if: ${{ env.RUN_APPIUM == 'true' }}
      shell: pwsh
      run: |
        npm install -g --force appium@2
        appium driver install windows
        appium driver list --installed
    - name: Log Node and Appium versions
      if: ${{ env.RUN_APPIUM == 'true' }}
      shell: pwsh
      run: |
        node -v
        appium -v
    - name: Resolve Appium main.js (Windows)
      if: ${{ env.RUN_APPIUM == 'true' }}
      shell: pwsh
      run: |
        $npmPrefix = (npm config get prefix).Trim()
        $appiumMain = Join-Path $npmPrefix "node_modules\appium\build\lib\main.js"
        if (-not (Test-Path $appiumMain)) {
          throw "Could not find Appium entrypoint at $appiumMain"
        }
        "APPIUM_MAIN=$appiumMain" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
    - name: Start Appium
      if: ${{ env.RUN_APPIUM == 'true' }}
      shell: pwsh
      run: |
        $appiumStdOut = "$env:RUNNER_TEMP\appium.log"
        $appiumStdErr = "$env:RUNNER_TEMP\appium-error.log"

        # Start Appium via node for deterministic behavior on Windows CI.
        $appiumProcess = Start-Process -FilePath "node" `
          -ArgumentList @($env:APPIUM_MAIN, "--address","127.0.0.1","--port","4723","--log-level","debug") `
          -PassThru -WindowStyle Hidden `
          -RedirectStandardOutput $appiumStdOut `
          -RedirectStandardError $appiumStdErr

        "APPIUM_PID=$($appiumProcess.Id)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "APPIUM_STDOUT=$appiumStdOut" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "APPIUM_STDERR=$appiumStdErr" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
    - name: Wait for Appium
      if: ${{ env.RUN_APPIUM == 'true' }}
      shell: pwsh
      run: |
        for ($i = 0; $i -lt 90; $i++) {
          $proc = Get-Process -Id $env:APPIUM_PID -ErrorAction SilentlyContinue
          if (-not $proc) {
            Write-Host "Appium process exited before becoming ready"
            Write-Host "RUNNER_TEMP=$env:RUNNER_TEMP"
            Get-ChildItem -Force $env:RUNNER_TEMP | Select-Object Name,Length,LastWriteTime | Format-Table -AutoSize

            if (Test-Path $env:APPIUM_STDOUT) { Write-Host "=== appium.log ==="; Get-Content $env:APPIUM_STDOUT -Tail 400 }
            if (Test-Path $env:APPIUM_STDERR) { Write-Host "=== appium-error.log ==="; Get-Content $env:APPIUM_STDERR -Tail 400 }
            throw "Appium exited before /status became reachable"
          }
          try {
            Invoke-WebRequest -UseBasicParsing "http://127.0.0.1:4723/status" | Out-Null
            Write-Host "Appium is up"
            exit 0
          } catch {
            Start-Sleep -Seconds 1
          }
        }
        if (Test-Path $env:APPIUM_STDOUT) { Write-Host "=== appium.log ==="; Get-Content $env:APPIUM_STDOUT -Tail 400 }
        if (Test-Path $env:APPIUM_STDERR) { Write-Host "=== appium-error.log ==="; Get-Content $env:APPIUM_STDERR -Tail 400 }
        throw "Appium did not start within 90 seconds"
    - name: Cache SonarCloud packages
      uses: actions/cache@v4
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar
    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    - name: Install Google Chrome # Using shell script to install Google Chrome
      run: |
       chmod +x ./src/test/resources/scripts/InstallChrome.sh
        ./src/test/resources/scripts/InstallChrome.sh
    - name: Build with Maven and Analyze with Sonar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: mvn -B org.jacoco:jacoco-maven-plugin:prepare-agent verify org.jacoco:jacoco-maven-plugin:report org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dheadless -DrecordTests -Dtimeout=20 -Dcucumber.filter.tags='not @WindowsOnly'
    - name: Stop Appium
      if: ${{ always() && env.RUN_APPIUM == 'true' }}
      shell: pwsh
      run: |
        if ($env:APPIUM_PID) {
          Stop-Process -Id $env:APPIUM_PID -Force -ErrorAction SilentlyContinue
        }
    - name: Upload Appium logs
      if: ${{ failure() && env.RUN_APPIUM == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: AppiumLogs
        path: |
          ${{ env.APPIUM_STDOUT }}
          ${{ env.APPIUM_STDERR }}
        if-no-files-found: ignore
    - name: Attach reports folder from build
      if: ${{ failure() }}
      continue-on-error: true
      uses: actions/upload-artifact@v4
      with:
        name: ReportsFolder
        path: ${{ github.workspace }}/reports
